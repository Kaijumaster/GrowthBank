<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowthBank: Anime Swimmer Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="anime-theme">
    <div id="page-overlay"></div>
    
    <div id="photo-collage">
        <img src="12.jpg" alt="Photo" class="collage-item pos-1">
        <img src="13.jpg" alt="Photo" class="collage-item pos-2">
        <img src="3.jpg" alt="Photo" class="collage-item pos-3">
        <img src="4.jpg" alt="Photo" class="collage-item pos-4">
        <img src="6.jpg" alt="Photo" class="collage-item pos-5">
        <img src="7.jpg" alt="Photo" class="collage-item pos-6">
        <img src="8.jpg" alt="Photo" class="collage-item pos-7">
    </div>

    <header>
        <h1>GrowthBank</h1>
        <div id="profile-card" class="stat-box anime-card">
            <img src="1.JPG" alt="Anime Avatar" id="anime-avatar">
            <div class="profile-stats">
                <span>Lifetime Points: <strong id="lifetime-points">Loading...</strong></span>
                <span>Value: <strong id="lifetime-value">$0.00</strong></span>
            </div>
        </div>
    </header>

    <main>
        <section id="logger-section" class="anime-card">
            <h2>Log Today's Progress</h2>
            <form id="daily-log-form">
                <div class="input-group">
                    <label for="log-date">Date</label>
                    <input type="date" id="log-date" required>
                </div>
                
                <div class="input-group">
                    <label for="study-mins">Study Minutes</label>
                    <input type="number" id="study-mins" min="0" value="0">
                </div>
                <div class="input-group">
                    <label for="writing-mins">Writing Minutes</label>
                    <input type="number" id="writing-mins" min="0" value="0">
                </div>
                <div class="input-group">
                    <label for="reading-mins">Reading Minutes</label>
                    <input type="number" id="reading-mins" min="0" value="0">
                </div>
                <div class="input-group">
                    <label for="quality-notes">Quality Notes (30m)</label>
                    <input type="number" id="quality-notes" min="0" value="0">
                </div>
                <div class="input-group">
                    <label for="revision-notes">Revision Notes (30m)</label>
                    <input type="number" id="revision-notes" min="0" value="0">
                </div>
                
                <fieldset>
                    <legend>Chores</legend>
                    <label><input type="checkbox" id="chore-room"> Cleaned Room</label>
                    <label><input type="checkbox" id="chore-dishes"> Washed Dishes</label>
                </fieldset>

                <button type="button" id="calculate-btn">Calculate Daily Total</button>
                <br><br>
               

		<button type="button" style="background: var(--accent);" onclick="sendLog('daily')">Save to Spreadsheet</button>
            </form>
        </section>

        <section id="breakdown-section" class="anime-card">
            <h2>Daily Breakdown</h2>
            <ul id="breakdown-list"></ul>
            <div id="daily-total" class="stat-box coral-highlight">
                <span>Today's Points: <strong id="today-points">0</strong></span>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
